<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Envio Manual | Bovino Ilustrado</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --color-bg: #0f0703;
            --color-card: #1c0e07;
            --color-input: #2a150b;
            --color-input-focus: #371e11;
            --color-text: #f7ede2;
            --color-text-muted: #b59f93;
            --color-primary: #be803a;
            --color-primary-hover: #a0672b;
            --color-success: #16a34a;
            --font-titles: 'Outfit', sans-serif;
            --font-body: 'Plus Jakarta Sans', sans-serif;
            --radius: 12px;
            --transition: all 0.2s ease-in-out;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-body);
            background-color: var(--color-bg);
            background-image: radial-gradient(circle at top, #2d160b 0%, #0f0703 100%);
            background-attachment: fixed;
            color: var(--color-text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
        }

        .dashboard-container {
            width: 100%;
            max-width: 580px;
            background-color: var(--color-card);
            border: 1px solid rgba(190, 128, 58, 0.25);
            border-radius: var(--radius);
            padding: 2.5rem;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4), 0 0 50px rgba(190, 128, 58, 0.08);
        }

        .header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .header h1 {
            font-family: var(--font-titles);
            font-size: 2rem;
            font-weight: 800;
            color: #ffffff;
            margin-bottom: 0.5rem;
            letter-spacing: -0.5px;
        }

        .header h1 span {
            color: var(--color-primary);
        }

        .header p {
            font-size: 0.9rem;
            color: var(--color-text-muted);
        }

        .form-group {
            margin-bottom: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        label {
            font-family: var(--font-titles);
            font-weight: 600;
            font-size: 0.9rem;
            color: #ffffff;
            letter-spacing: 0.5px;
        }

        input[type="text"],
        input[type="email"] {
            width: 100%;
            padding: 0.85rem 1rem;
            background-color: var(--color-input);
            border: 1px solid rgba(16, 185, 129, 0.1);
            border-radius: 8px;
            color: #ffffff;
            font-family: inherit;
            font-size: 0.95rem;
            transition: var(--transition);
        }

        input[type="text"]:focus,
        input[type="email"]:focus {
            outline: none;
            border-color: var(--color-primary);
            background-color: var(--color-input-focus);
            box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.15);
        }

        .radio-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .radio-card {
            background-color: var(--color-input);
            border: 2px solid transparent;
            border-radius: 8px;
            padding: 1rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            cursor: pointer;
            transition: var(--transition);
        }

        .radio-card:hover {
            background-color: var(--color-input-focus);
        }

        .radio-card input {
            accent-color: var(--color-primary);
            width: 1.15rem;
            height: 1.15rem;
        }

        .radio-card.selected {
            border-color: var(--color-primary);
            background-color: var(--color-input-focus);
        }

        .radio-info {
            display: flex;
            flex-direction: column;
            gap: 0.15rem;
        }

        .radio-title {
            font-family: var(--font-titles);
            font-weight: 700;
            font-size: 0.95rem;
            color: #ffffff;
        }

        .radio-desc {
            font-size: 0.75rem;
            color: var(--color-text-muted);
        }

        .checkbox-section {
            background-color: rgba(0, 0, 0, 0.15);
            border-radius: 8px;
            padding: 1.25rem;
            margin-bottom: 2rem;
            border: 1px solid rgba(255, 255, 255, 0.03);
        }

        .checkbox-section-title {
            font-family: var(--font-titles);
            font-weight: 700;
            font-size: 0.95rem;
            color: #ffffff;
            margin-bottom: 1rem;
            display: block;
        }

        .checkbox-grid {
            display: flex;
            flex-direction: column;
            gap: 0.85rem;
        }

        .checkbox-item {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            cursor: pointer;
        }

        .checkbox-item input {
            accent-color: var(--color-primary);
            width: 1.15rem;
            height: 1.15rem;
            cursor: pointer;
        }

        .checkbox-label-text {
            font-size: 0.9rem;
            color: var(--color-text);
            user-select: none;
        }

        .btn-submit {
            width: 100%;
            padding: 1.1rem;
            background: linear-gradient(135deg, var(--color-primary) 0%, var(--color-primary-hover) 100%);
            color: #ffffff;
            border: none;
            border-radius: 8px;
            font-family: var(--font-titles);
            font-weight: 800;
            font-size: 1.1rem;
            letter-spacing: 0.5px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.3);
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .btn-submit:hover:not(:disabled) {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(16, 185, 129, 0.4);
        }

        .btn-submit:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .spinner {
            width: 1.25rem;
            height: 1.25rem;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: #ffffff;
            animation: spin 1s ease-in-out infinite;
            display: none;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Status Messages */
        .status-box {
            margin-top: 1.5rem;
            padding: 1rem;
            border-radius: 8px;
            font-size: 0.85rem;
            line-height: 1.45;
            display: none;
        }

        .status-success {
            background-color: rgba(21, 128, 61, 0.15);
            border: 1px solid rgba(21, 128, 61, 0.3);
            color: #4ade80;
        }

        .status-error {
            background-color: rgba(220, 38, 38, 0.15);
            border: 1px solid rgba(220, 38, 38, 0.3);
            color: #f87171;
        }
    </style>
</head>

<body>
    <div class="dashboard-container">
        <div class="header">
            <h1>Painel de <span>Envio Manual</span></h1>
            <p>Cadastre o cliente no banco de dados e dispare o acesso imediatamente</p>
        </div>

        <form id="manual-entry-form">
            <!-- Nome -->
            <div class="form-group">
                <label for="client-name">NOME COMPLETO DO CLIENTE</label>
                <input type="text" id="client-name" placeholder="Ex: João da Silva" autocomplete="off">
            </div>

            <!-- E-mail -->
            <div class="form-group">
                <label for="client-email">E-MAIL DE ACESSO</label>
                <input type="email" id="client-email" placeholder="Ex: cliente@email.com" required autocomplete="off">
            </div>

            <!-- Seleção de Plano -->
            <div class="form-group">
                <label>PLANO DA COMPRA</label>
                <div class="radio-group">
                    <div class="radio-card selected" onclick="selectPlan('basico')">
                        <input type="radio" id="plan-basico" name="plan-choice" value="basico" checked>
                        <div class="radio-info">
                            <span class="radio-title">Plano Básico</span>
                            <span class="radio-desc">Apenas material bovino</span>
                        </div>
                    </div>
                    <div class="radio-card" onclick="selectPlan('completo')">
                        <input type="radio" id="plan-completo" name="plan-choice" value="completo">
                        <div class="radio-info">
                            <span class="radio-title">Plano Completo</span>
                            <span class="radio-desc">+ 3 Bônus e Certificado</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Checkboxes de adicionais -->
            <div class="checkbox-section">
                <span class="checkbox-section-title">SELECIONE ADICIONAIS ADQUIRIDOS (ORDERBUMP / UPSELL)</span>
                <div class="checkbox-grid">
                    <label class="checkbox-item">
                        <input type="checkbox" id="bump-meds" value="250 Medicamentos Veterinários Ilustrados">
                        <span class="checkbox-label-text">250 Medicamentos Veterinários Ilustrados (Bump)</span>
                    </label>
                    <label class="checkbox-item">
                        <input type="checkbox" id="bump-first-aid" value="Kit de Primeiros Socorros em Bovinos">
                        <span class="checkbox-label-text">Kit de Primeiros Socorros em Bovinos (Bump)</span>
                    </label>
                    <label class="checkbox-item">
                        <input type="checkbox" id="bump-nutrition" value="Manual de Manejo Nutricional Bovino">
                        <span class="checkbox-label-text">Manual de Manejo Nutricional Bovino (Bump)</span>
                    </label>
                    <label class="checkbox-item">
                        <input type="checkbox" id="upsell-multiespecies" value="Kit Completo de Identificação Animal">
                        <span class="checkbox-label-text"><strong>Material Multiespécies</strong> (Suínos/Aves/etc.) (Upsell)</span>
                    </label>
                </div>
            </div>

            <!-- Configurações de Envio -->
            <div style="margin-bottom: 2rem; display: flex; align-items: center; gap: 0.75rem; background: rgba(255,255,255,0.02); padding: 0.85rem; border-radius: 8px; border: 1px solid rgba(255,255,255,0.05);">
                <input type="checkbox" id="skip-email-sending" style="accent-color: var(--color-primary); width: 1.15rem; height: 1.15rem; cursor: pointer;">
                <label for="skip-email-sending" style="font-size: 0.9rem; color: var(--color-text-muted); cursor: pointer; user-select: none; font-weight: 500;">
                    Apenas atualizar no banco (não enviar e-mail novamente)
                </label>
            </div>

            <!-- Botão de Envio -->
            <button type="submit" class="btn-submit" id="btn-submit-panel">
                <div class="spinner" id="btn-spinner"></div>
                <span id="btn-text">CADASTRAR E ENVIAR ACESSO</span>
            </button>
        </form>

        <!-- Status Result -->
        <div class="status-box" id="status-message"></div>
    </div>

    <script>
        const supabaseAnonKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpleHZ3aGhteHZqbGJua3NnamtyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI0MTE0MzksImV4cCI6MjA5Nzk4NzQzOX0.hUCNqjqSi7haGBHRPTFhkYdAMmuDXwQOxDUwNx9QcXk";
        let isExistingMember = false;

        function selectPlan(plan) {
            document.querySelectorAll('.radio-card').forEach(card => card.classList.remove('selected'));
            if (plan === 'basico') {
                document.getElementById('plan-basico').checked = true;
                document.getElementById('plan-basico').parentElement.classList.add('selected');
            } else {
                document.getElementById('plan-completo').checked = true;
                document.getElementById('plan-completo').parentElement.classList.add('selected');
            }
        }

        // Busca dados do cliente dinamicamente ao sair do campo de e-mail
        document.getElementById('client-email').addEventListener('blur', async (e) => {
            const email = e.target.value.trim().toLowerCase();
            if (!email) return;

            try {
                const response = await fetch(`https://zexvwhhmxvjlbnksgjkr.supabase.co/rest/v1/members?email=eq.${encodeURIComponent(email)}`, {
                    headers: {
                        "apikey": supabaseAnonKey,
                        "Authorization": `Bearer ${supabaseAnonKey}`
                    }
                });

                if (response.ok) {
                    const data = await response.json();
                    if (data && data.length > 0) {
                        const member = data[0];
                        isExistingMember = true;
                        
                        // Preenche nome
                        document.getElementById('client-name').value = member.name || '';
                        
                        // Seleciona plano
                        const plan = (member.plan || '').toLowerCase();
                        if (plan.includes('completo')) {
                            selectPlan('completo');
                        } else {
                            selectPlan('basico');
                        }

                        // Marca orderbumps ativos no banco (usando palavras-chave para abranger nomes antigos e novos)
                        const orderbumps = member.orderbumps || [];
                        document.getElementById('bump-meds').checked = orderbumps.some(x => x.toLowerCase().includes('medicamentos'));
                        document.getElementById('bump-first-aid').checked = orderbumps.some(x => x.toLowerCase().includes('socorros'));
                        document.getElementById('bump-nutrition').checked = orderbumps.some(x => x.toLowerCase().includes('nutricional') || x.toLowerCase().includes('alimentação') || x.toLowerCase().includes('alimentacao'));
                        document.getElementById('upsell-multiespecies').checked = orderbumps.some(x => x.toLowerCase().includes('suínos') || x.toLowerCase().includes('suinos') || x.toLowerCase().includes('identificação animal') || x.toLowerCase().includes('identificacao animal') || x.toLowerCase().includes('multiespécies') || x.toLowerCase().includes('multiespecies'));

                        // Altera botão de envio
                        document.getElementById('btn-text').innerText = 'ATUALIZAR CADASTRO';
                    } else {
                        isExistingMember = false;
                        document.getElementById('btn-text').innerText = 'CADASTRAR E ENVIAR ACESSO';
                    }
                }
            } catch (err) {
                console.error("Erro ao buscar dados do cliente:", err);
            }
        });

        document.getElementById('manual-entry-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            const name = document.getElementById('client-name').value.trim();
            const email = document.getElementById('client-email').value.trim().toLowerCase();
            const planValue = document.querySelector('input[name="plan-choice"]:checked').value;
            
            const btnSubmit = document.getElementById('btn-submit-panel');
            const spinner = document.getElementById('btn-spinner');
            const btnText = document.getElementById('btn-text');
            const statusBox = document.getElementById('status-message');

            statusBox.style.display = 'none';

            // Validação de nome obrigatório apenas para novos cadastros
            if (!name && !isExistingMember) {
                statusBox.className = "status-box status-error";
                statusBox.innerHTML = `<strong>❌ ERRO NO ENVIO</strong><br>O nome completo é obrigatório para novos cadastros.`;
                statusBox.style.display = "block";
                return;
            }

            btnSubmit.disabled = true;
            spinner.style.display = 'block';
            btnText.innerText = 'Processando...';

            // 1. Define o título do produto principal baseado no plano
            const mainTitle = planValue === 'completo' 
                ? "Plano Completo - 150 Reparos e Diagnósticos Ilustrados em Máquinas de Lavar e Tanquinhos" 
                : "Plano Básico - 150 Reparos e Diagnósticos Ilustrados em Máquinas de Lavar e Tanquinhos";

            // 2. Constrói a lista de produtos (principal + bumps)
            const productsList = [
                {
                    "title": mainTitle,
                    "type": "main"
                }
            ];

            // Adiciona orderbumps se selecionados
            const bumps = [
                document.getElementById('bump-meds'),
                document.getElementById('bump-first-aid'),
                document.getElementById('bump-nutrition'),
                document.getElementById('upsell-multiespecies')
            ];

            bumps.forEach(bump => {
                if (bump.checked) {
                    productsList.push({
                        "title": bump.value,
                        "type": "orderbump"
                    });
                }
            });

            const skipEmail = document.getElementById('skip-email-sending').checked;

            // 3. Monta o Payload Mock para simular compra aprovada via Webhook
            const payload = {
                "event": "pix.paid",
                "only_update_db": skipEmail,
                "is_manual_panel": true,
                "payment": {
                    "status": "paid",
                    "amount": planValue === 'completo' ? 47.70 : 27.90
                },
                "customer": {
                    "name": name || "Cliente",
                    "email": email,
                    "phone": "5500000000000"
                },
                "product": {
                    "title": mainTitle,
                    "type": "main"
                },
                "products": productsList
            };

            try {
                // Dispara o POST diretamente para a Edge Function de Webhook do Supabase
                const response = await fetch("https://zexvwhhmxvjlbnksgjkr.supabase.co/functions/v1/ggcheckout-webhook", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify(payload)
                });

                const result = await response.json();

                if (response.ok && result.success) {
                    statusBox.className = "status-box status-success";
                    const emailMsg = skipEmail ? "Atualizado apenas no banco (e-mail ignorado)" : `Acesso enviado com sucesso para <strong>${email}</strong>`;
                    statusBox.innerHTML = `<strong>🎉 SUCESSO!</strong><br>Cliente processado com sucesso.<br><br>• Status: <strong>${emailMsg}</strong><br>• Plano: <strong>${planValue === 'completo' ? 'Completo' : 'Básico'}</strong><br>• Adicionais ativos: ${productsList.length - 1} item(ns).`;
                    statusBox.style.display = "block";
                    document.getElementById('manual-entry-form').reset();
                    selectPlan('basico');
                    document.getElementById('btn-text').innerText = 'CADASTRAR E ENVIAR ACESSO';
                    isExistingMember = false;
                } else {
                    throw new Error(result.error || "Erro no processamento da Edge Function.");
                }
            } catch (err) {
                statusBox.className = "status-box status-error";
                statusBox.innerHTML = `<strong>❌ ERRO NO ENVIO</strong><br>${err.message}<br><br>Verifique se os dados estão corretos ou tente novamente.`;
                statusBox.style.display = "block";
            } finally {
                btnSubmit.disabled = false;
                spinner.style.display = 'none';
                if (!isExistingMember) {
                    btnText.innerText = 'CADASTRAR E ENVIAR ACESSO';
                } else {
                    btnText.innerText = 'ATUALIZAR CADASTRO';
                }
            }
        });
    </script>
</body>

</html>
